<!-- ============================================================
     NEWSLETTER SECTION — paste this into index.html
     Replace the existing Smartsheet newsletter embed section
     ============================================================ -->
<div class="section" id="newsletter">
  <div class="section-inner" style="max-width:600px;">
    <div class="section-header">
      <div class="section-tag">// STAY IN THE LOOP</div>
      <h2 class="section-title">Join the Newsletter</h2>
      <p class="section-sub">Campaign updates, events, and how to earn XP — straight to your inbox.</p>
    </div>

    <div style="background:var(--bg-card);border:1px solid var(--border-glow);border-radius:16px;padding:2rem;">
      <div id="newsletter-form">
        <input
          type="email"
          id="newsletter-email"
          placeholder="your@email.com"
          style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(0,240,255,0.25);border-radius:8px;padding:.9rem 1rem;color:var(--text-primary);font-family:var(--font-ui);font-size:1rem;outline:none;margin-bottom:1rem;box-sizing:border-box;"
          onkeydown="if(event.key==='Enter')submitNewsletter()"
        >
        <button onclick="submitNewsletter()" class="btn btn-purple" style="width:100%;justify-content:center;">
          ⚡ Subscribe — It's Free
        </button>
        <div id="newsletter-msg" style="display:none;margin-top:.75rem;padding:.6rem 1rem;border-radius:8px;font-family:var(--font-ui);font-size:.9rem;text-align:center;"></div>
      </div>
    </div>
  </div>
</div>

<script>
async function submitNewsletter() {
  const email = document.getElementById('newsletter-email').value.trim();
  const msg = document.getElementById('newsletter-msg');

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    msg.style.display = 'block';
    msg.style.cssText += ';background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.3);color:#ff4444;';
    msg.textContent = '✗ Please enter a valid email address.';
    return;
  }

  const btn = document.querySelector('#newsletter-form button');
  btn.disabled = true;
  btn.textContent = 'Subscribing...';

  try {
    const res = await fetch('https://ljxvkdslqxmmedfhrwgu.supabase.co/rest/v1/newsletter_signups', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqeHZrZHNscXhtbWVkZmhyd2d1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NTU0ODQsImV4cCI6MjA5NTMzMTQ4NH0.nUCmAINQ1yL_XdDX9rNBl0gadjyP0ON9rWvb3Tarut4',
        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqeHZrZHNscXhtbWVkZmhyd2d1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NTU0ODQsImV4cCI6MjA5NTMzMTQ4NH0.nUCmAINQ1yL_XdDX9rNBl0gadjyP0ON9rWvb3Tarut4',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ email, signed_up_at: new Date().toISOString() })
    });

    if (res.status === 201 || res.status === 200) {
      msg.style.display = 'block';
      msg.style.cssText += ';background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);color:#00ff88;';
      msg.textContent = '✓ You\'re in! Welcome to the movement. 🗳️';
      document.getElementById('newsletter-email').value = '';
    } else if (res.status === 409) {
      msg.style.display = 'block';
      msg.style.cssText += ';background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.3);color:var(--neon-gold);';
      msg.textContent = '⚡ You\'re already subscribed!';
    } else {
      throw new Error('Unexpected response');
    }
  } catch(err) {
    msg.style.display = 'block';
    msg.style.cssText += ';background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.3);color:#ff4444;';
    msg.textContent = '✗ Something went wrong. Please try again.';
  }

  btn.disabled = false;
  btn.textContent = '⚡ Subscribe — It\'s Free';
}
</script>
