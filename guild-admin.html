<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Guild — VoteReederXP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Exo+2:wght@300;400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.guild-hero {
  background: linear-gradient(135deg, rgba(191,0,255,0.15), rgba(255,0,170,0.08));
  border-bottom: 2px solid var(--neon-purple);
  padding: 2.5rem 2rem 2rem;
  text-align: center;
}
.guild-emblem { font-size: 5rem; margin-bottom: .75rem; display: block; }
.guild-name { font-family: var(--font-display); font-size: clamp(2rem,5vw,3.5rem); font-weight: 900; color: var(--neon-purple); text-shadow: 0 0 30px rgba(191,0,255,0.5); margin-bottom: .5rem; }
.guild-tagline { font-family: var(--font-ui); font-size: 1.1rem; color: var(--text-dim); }
.guild-content { display: grid; grid-template-columns: 1fr 380px; gap: 1.5rem; max-width: 1200px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }
@media(max-width:900px) { .guild-content { grid-template-columns: 1fr; padding: 1rem; } }
.panel { background: var(--bg-card); border: 1px solid var(--border-glow); border-radius: 16px; padding: 1.25rem; margin-bottom: 1.25rem; }
.panel-title { font-family: var(--font-display); font-size: .8rem; color: var(--neon-purple); letter-spacing: .15em; text-transform: uppercase; margin-bottom: 1rem; padding-bottom: .6rem; border-bottom: 1px solid rgba(191,0,255,0.3); }
.chat-wrap { display: flex; flex-direction: column; height: 500px; }
.chat-messages { flex: 1; overflow-y: auto; padding: .5rem 0; display: flex; flex-direction: column; gap: .5rem; }
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-thumb { background: rgba(191,0,255,0.4); border-radius: 4px; }
.chat-msg { padding: .6rem .85rem; border-radius: 10px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); }
.chat-msg.announcement { background: rgba(191,0,255,0.1); border-color: rgba(191,0,255,0.3); }
.chat-msg.own { background: rgba(0,240,255,0.06); border-color: rgba(0,240,255,0.2); }
.chat-msg-header { display: flex; align-items: center; gap: .5rem; margin-bottom: .25rem; }
.chat-username { font-family: var(--font-display); font-size: .7rem; color: var(--neon-purple); font-weight: 700; }
.chat-msg.own .chat-username { color: var(--neon-blue); }
.chat-time { font-family: var(--font-ui); font-size: .65rem; color: var(--text-dim); margin-left: auto; }
.chat-pin { font-size: .65rem; color: var(--neon-purple); }
.chat-text { font-family: var(--font-ui); font-size: .88rem; color: var(--text-primary); line-height: 1.5; }
.chat-delete { font-size: .65rem; color: var(--text-dim); cursor: pointer; margin-left: auto; opacity: 0; transition: opacity .2s; }
.chat-msg:hover .chat-delete { opacity: 1; }
.chat-input-wrap { border-top: 1px solid var(--border-glow); padding-top: .75rem; margin-top: .75rem; }
.chat-input-row { display: flex; gap: .5rem; }
.chat-input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(191,0,255,0.3); border-radius: 8px; padding: .6rem .85rem; color: var(--text-primary); font-family: var(--font-ui); font-size: .9rem; outline: none; }
.chat-input:focus { border-color: var(--neon-purple); }
.chat-send-btn { font-family: var(--font-display); font-size: .65rem; letter-spacing: .08em; background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink)); color: #fff; border: none; border-radius: 8px; padding: .6rem 1rem; cursor: pointer; font-weight: 700; }
.chat-announce-btn { font-family: var(--font-display); font-size: .6rem; background: rgba(191,0,255,0.15); color: var(--neon-purple); border: 1px solid rgba(191,0,255,0.4); border-radius: 6px; padding: .4rem .75rem; cursor: pointer; margin-top: .4rem; width: 100%; }
.access-denied { text-align: center; padding: 4rem 2rem; }
.access-denied h2 { font-family: var(--font-display); color: var(--neon-pink); margin-bottom: 1rem; }
.access-denied p { font-family: var(--font-ui); color: var(--text-dim); }
.email-input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(191,0,255,0.3); border-radius: 8px; padding: .55rem .85rem; color: var(--text-primary); font-family: var(--font-ui); font-size: .88rem; outline: none; box-sizing: border-box; margin-bottom: .75rem; }
.email-textarea { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(191,0,255,0.3); border-radius: 8px; padding: .55rem .85rem; color: var(--text-primary); font-family: var(--font-ui); font-size: .88rem; outline: none; box-sizing: border-box; min-height: 120px; resize: vertical; margin-bottom: .75rem; }
.email-label { font-family: var(--font-ui); font-size: .8rem; color: var(--text-dim); margin-bottom: .35rem; display: block; }
.email-send-btn { width: 100%; font-family: var(--font-display); font-size: .72rem; letter-spacing: .08em; border: none; border-radius: 8px; padding: .65rem; cursor: pointer; font-weight: 700; margin-bottom: .5rem; }
.btn-admins { background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue)); color: #fff; }
.btn-all { background: linear-gradient(135deg, var(--neon-pink), #ff6600); color: #fff; }
.admin-list-row { display: flex; align-items: center; gap: .75rem; padding: .5rem .6rem; border-radius: 8px; margin-bottom: .35rem; background: rgba(255,255,255,0.03); border: 1px solid var(--border-glow); }
.admin-role-badge { font-family: var(--font-ui); font-size: .65rem; padding: .1rem .4rem; border-radius: 4px; }
.role-super { background: rgba(191,0,255,0.2); color: var(--neon-purple); border: 1px solid rgba(191,0,255,0.3); }
.role-editor { background: rgba(0,240,255,0.1); color: var(--neon-blue); border: 1px solid rgba(0,240,255,0.2); }
.role-viewer { background: rgba(255,255,255,0.06); color: var(--text-dim); border: 1px solid var(--border-glow); }
</style>
</head>
<body>
<div class="page-content">

  <div id="access-denied" class="access-denied" style="display:none;">
    <h2>🔒 Access Restricted</h2>
    <p>This area is for campaign admins only.</p>
  </div>

  <div id="admin-content" style="display:none;">
    <div class="guild-hero">
      <span class="guild-emblem">🛡️</span>
      <div class="guild-name">ADMIN COMMAND</div>
      <div class="guild-tagline">Campaign leadership hub — internal communications only</div>
    </div>

    <div class="guild-content">

      <!-- LEFT: CHAT -->
      <div>
        <div class="panel">
          <div class="panel-title">💬 Admin Chat</div>
          <div class="chat-wrap">
            <div class="chat-messages" id="chat-messages">
              <div style="text-align:center;padding:2rem;font-family:var(--font-ui);font-size:.85rem;color:var(--text-dim);">Loading messages...</div>
            </div>
            <div class="chat-input-wrap">
              <div class="chat-input-row">
                <input class="chat-input" id="chat-input" placeholder="Message the admin team..." maxlength="500" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}">
                <button class="chat-send-btn" onclick="sendMessage()">SEND</button>
              </div>
              <button class="chat-announce-btn" onclick="sendMessage(true)">📌 Post as Announcement</button>
            </div>
          </div>
        </div>
      </div>

      <!-- RIGHT: EMAIL + ADMIN LIST -->
      <div>
        <div class="panel">
          <div class="panel-title">📧 Send Email</div>
          <label class="email-label">Subject</label>
          <input class="email-input" id="email-subject" placeholder="Subject line...">
          <label class="email-label">Message</label>
          <textarea class="email-textarea" id="email-body" placeholder="Write your message..."></textarea>
          <button class="email-send-btn btn-admins" onclick="sendEmail('admins')">⚡ SEND TO ALL ADMINS</button>
          <button class="email-send-btn btn-all" onclick="sendEmail('all')">🚀 SEND TO ALL GUILD MEMBERS</button>
          <div id="email-msg" style="font-family:var(--font-ui);font-size:.82rem;margin-top:.5rem;text-align:center;"></div>
        </div>

        <div class="panel">
          <div class="panel-title">👥 Admin Team</div>
          <div id="admin-list">
            <div style="font-family:var(--font-ui);font-size:.82rem;color:var(--text-dim);text-align:center;padding:1rem;">Loading...</div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const GUILD_NAME = 'Admin';
const MAKE_WEBHOOK = 'https://hook.us2.make.com/bpin13esoqm8ymmwhzyiy81uhomhb5ye';
const SUPABASE_URL = 'https://ljxvkdslqxmmedfhrwgu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqeHZrZHNscXhtbWVkZmhyd2d1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NTU0ODQsImV4cCI6MjA5NTMzMTQ4NH0.nUCmAINQ1yL_XdDX9rNBl0gadjyP0ON9rWvb3Tarut4';
const ADMIN_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSWflC-rX01G1bhMdahO-tCzkuDRjDmjouukJzC1AyVBPeEVnQmbDIDmGOBAkKUPDnZp-Xo-K1FJd7m/pub?gid=60615754&single=true&output=csv';

let currentUser = null;
let currentUsername = null;
let isAdmin = false;

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g,'').trim());
  return lines.slice(1).map(line => {
    const cols = []; let cur = '', inQ = false;
    for(let i = 0; i < line.length; i++) {
      if(line[i]==='"'){inQ=!inQ;}
      else if(line[i]===','&&!inQ){cols.push(cur.trim());cur='';}
      else{cur+=line[i];}
    }
    cols.push(cur.trim());
    const obj = {};
    headers.forEach((h,i) => obj[h] = (cols[i]||'').replace(/^"|"$/g,'').trim());
    return obj;
  });
}

async function checkAdminAccess() {
  try {
    const res = await fetch(ADMIN_CSV);
    const text = await res.text();
    const rows = parseCSV(text);
    const adminRow = rows.find(r => r.Email === currentUser?.email && r.Active !== 'FALSE');
    if (adminRow) {
      isAdmin = true;
      document.getElementById('access-denied').style.display = 'none';
      document.getElementById('admin-content').style.display = 'block';
      loadAdminList(rows);
      loadMessages();
      setupRealtime();
    } else {
      document.getElementById('access-denied').style.display = 'block';
    }
  } catch(e) {
    document.getElementById('access-denied').style.display = 'block';
  }
}

function loadAdminList(rows) {
  const list = document.getElementById('admin-list');
  const active = rows.filter(r => r.Active !== 'FALSE' && r.Name);
  list.innerHTML = active.map(r => {
    const roleClass = r.Role === 'Super Admin' ? 'role-super' : r.Role === 'Editor' ? 'role-editor' : 'role-viewer';
    return `<div class="admin-list-row">
      <div style="font-family:var(--font-ui);font-size:.85rem;color:var(--text-primary);flex:1;">${r.Name}</div>
      <span class="admin-role-badge ${roleClass}">${r.Role}</span>
      ${r.Guild ? `<span style="font-family:var(--font-ui);font-size:.65rem;color:var(--text-dim);">${r.Guild}</span>` : ''}
    </div>`;
  }).join('') || '<div style="font-family:var(--font-ui);font-size:.82rem;color:var(--text-dim);text-align:center;">No admins found</div>';
}

async function loadMessages() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/guild_messages?guild=eq.Admin&order=created_at.asc&limit=100`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    const msgs = await res.json();
    renderMessages(msgs);
  } catch(e) {}
}

function renderMessages(msgs) {
  const container = document.getElementById('chat-messages');
  if (!msgs || msgs.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:2rem;font-family:var(--font-ui);font-size:.85rem;color:var(--text-dim);">No messages yet — start the conversation! 🛡️</div>';
    return;
  }
  container.innerHTML = msgs.map(m => {
    const isOwn = currentUser && m.user_id === currentUser.id;
    const time = new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    const date = new Date(m.created_at).toLocaleDateString([], {month:'short',day:'numeric'});
    return `<div class="chat-msg ${m.is_announcement?'announcement':''} ${isOwn?'own':''}" data-id="${m.id}">
      <div class="chat-msg-header">
        <span class="chat-username">${m.username||'Admin'}</span>
        ${m.is_announcement?'<span class="chat-pin">📌 ANNOUNCEMENT</span>':''}
        <span class="chat-time">${date} ${time}</span>
        ${isOwn?`<span class="chat-delete" onclick="deleteMessage('${m.id}')">✕</span>`:''}
      </div>
      <div class="chat-text">${escapeHtml(m.message)}</div>
    </div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function sendMessage(isAnnouncement = false) {
  if (!currentUser || !isAdmin) return;
  const input = document.getElementById('chat-input');
  const message = input.value.trim();
  if (!message) return;
  input.value = '';
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/guild_messages`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ guild: 'Admin', user_id: currentUser.id, username: currentUsername, message, is_announcement: isAnnouncement })
    });
  } catch(e) {}
}

async function deleteMessage(id) {
  if (!currentUser) return;
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/guild_messages?id=eq.${id}`, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
  } catch(e) {}
}

async function sendEmail(target) {
  const subject = document.getElementById('email-subject').value.trim();
  const body    = document.getElementById('email-body').value.trim();
  const msg     = document.getElementById('email-msg');
  if (!subject || !body) { msg.style.color='var(--neon-pink)'; msg.textContent='Please fill in subject and message.'; return; }
  msg.style.color='var(--text-dim)'; msg.textContent='Sending...';
  try {
    await fetch(MAKE_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'admin_email', target, subject, body, sender: currentUsername })
    });
    msg.style.color='#00ff88';
    msg.textContent = target === 'all' ? '✓ Email sent to all guild members!' : '✓ Email sent to all admins!';
    document.getElementById('email-subject').value = '';
    document.getElementById('email-body').value = '';
  } catch(e) {
    msg.style.color='var(--neon-pink)'; msg.textContent='Something went wrong. Try again.';
  }
}

function setupRealtime() {
  if (!window.sb) return;
  window.sb.channel('admin-guild-chat')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'guild_messages', filter: 'guild=eq.Admin' }, () => loadMessages())
    .subscribe();
}

document.addEventListener('DOMContentLoaded', () => {
  const check = setInterval(async () => {
    if (!window.sb) return;
    clearInterval(check);
    const { data: { session } } = await window.sb.auth.getSession();
    if (session?.user) {
      currentUser = session.user;
      const { data: profile } = await window.sb.from('profiles').select('username').eq('id', session.user.id).single();
      currentUsername = profile?.username || session.user.email.split('@')[0];
      await checkAdminAccess();
    } else {
      document.getElementById('access-denied').style.display = 'block';
      document.getElementById('access-denied').innerHTML = '<h2>🔒 Please Log In</h2><p>Admin access requires authentication.</p>';
    }
  }, 200);
});
</script>

  <!-- SOCIAL FEED -->
  <div style="max-width:1280px;margin:2rem auto;padding:0 2rem 4rem;">
    <div style="text-align:center;margin-bottom:1.5rem;">
      <div style="font-family:var(--font-display);font-size:.7rem;color:var(--neon-blue);letter-spacing:.3em;text-transform:uppercase;margin-bottom:.35rem;">// CAMPAIGN FEED</div>
      <div style="font-family:var(--font-display);font-size:1.4rem;font-weight:900;color:var(--text-primary);">📱 Latest from the Trail</div>
    </div>
    <div style="border:1px solid var(--border-glow);border-radius:16px;overflow:hidden;background:rgba(255,255,255,0.02);width:100%;">
      <div style="position:relative;width:100%;padding-bottom:100%;height:0;overflow:hidden;">
        <iframe src="https://www.juicer.io/api/feeds/elect-karen-reeder/iframe" frameborder="0" style="position:absolute;top:0;left:0;width:100%;height:500px;display:block;" title="Elect Karen Reeder - Juicer social media feed"></iframe>
      </div>
    </div>
  </div>
<script src="shared.js"></script>
</body>
</html>
